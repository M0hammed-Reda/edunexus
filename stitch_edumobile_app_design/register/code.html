<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Register | Intellectual Sanctuary</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@700;800&amp;display=swap" rel="stylesheet"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-fixed-dim": "#ffb59d",
                    "on-secondary": "#ffffff",
                    "on-tertiary-fixed-variant": "#832600",
                    "on-secondary-fixed-variant": "#394472",
                    "surface-dim": "#d9dadb",
                    "on-error": "#ffffff",
                    "secondary-fixed-dim": "#b9c4fa",
                    "inverse-primary": "#b7c4ff",
                    "on-secondary-container": "#475281",
                    "surface-container-highest": "#e1e3e4",
                    "on-primary-container": "#b2bfff",
                    "surface-container-high": "#e7e8e9",
                    "outline": "#747685",
                    "surface-tint": "#2f53ce",
                    "on-background": "#191c1d",
                    "secondary-container": "#bcc7fd",
                    "tertiary": "#6c1e00",
                    "surface-container-lowest": "#ffffff",
                    "primary-fixed-dim": "#b7c4ff",
                    "primary": "#002c98",
                    "on-tertiary-container": "#ffaf95",
                    "primary-fixed": "#dde1ff",
                    "on-surface-variant": "#444654",
                    "background": "#f8f9fa",
                    "primary-container": "#1a43bf",
                    "on-error-container": "#93000a",
                    "surface-variant": "#e1e3e4",
                    "outline-variant": "#c4c5d6",
                    "on-primary-fixed-variant": "#0438b6",
                    "on-primary": "#ffffff",
                    "tertiary-fixed": "#ffdbd0",
                    "surface-container": "#edeeef",
                    "inverse-surface": "#2e3132",
                    "secondary-fixed": "#dde1ff",
                    "inverse-on-surface": "#f0f1f2",
                    "on-tertiary-fixed": "#390c00",
                    "on-surface": "#191c1d",
                    "secondary": "#515c8b",
                    "surface-container-low": "#f3f4f5",
                    "on-tertiary": "#ffffff",
                    "on-secondary-fixed": "#0b1844",
                    "on-primary-fixed": "#001453",
                    "tertiary-container": "#932c00",
                    "surface-bright": "#f8f9fa",
                    "surface": "#f8f9fa",

                    "error": "#ba1a1a"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }
        .headline-font {
            font-family: 'Manrope', sans-serif;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen flex flex-col items-center justify-center p-6 overflow-hidden relative">
<div class="absolute inset-0 z-0">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-tertiary/5 blur-[120px]"></div>
</div>
<div class="w-full max-w-md z-10 flex flex-col space-y-12">
<div class="flex flex-col items-center space-y-4">
<div class="w-16 h-16 bg-primary rounded-2xl flex items-center justify-center shadow-2xl shadow-primary/20 rotate-3 transform hover:rotate-0 transition-transform duration-500">
<span class="material-symbols-outlined text-on-primary text-4xl" data-icon="auto_stories">auto_stories</span>
</div>
<h1 class="headline-font text-2xl font-extrabold tracking-tight text-primary">
                Intellectual Sanctuary
            </h1>
</div>
<div class="space-y-8">
<div class="text-center">
<h2 class="headline-font text-4xl font-extrabold text-on-surface tracking-tight">
                    Register
                </h2>
<p class="text-slate-500 mt-2 font-medium">Join the sanctuary of knowledge.</p>
</div>
<form class="space-y-6" onsubmit="return false;">
<div class="space-y-5">
<div class="relative group">
<label class="block text-[11px] font-bold uppercase tracking-wider text-slate-400 mb-2 ml-1" for="name">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors" data-icon="person">person</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-highest/50 border-none rounded-xl text-on-surface placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all duration-300" id="name" placeholder="Leonardo da Vinci" type="text"/>
</div>
</div>
<div class="relative group">
<label class="block text-[11px] font-bold uppercase tracking-wider text-slate-400 mb-2 ml-1" for="email">Academic Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors" data-icon="school">school</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-highest/50 border-none rounded-xl text-on-surface placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all duration-300" id="email" placeholder="scholar@edu.flow" type="email"/>
</div>
</div>
<div class="relative group">
<label class="block text-[11px] font-bold uppercase tracking-wider text-slate-400 mb-2 ml-1" for="passphrase">Passphrase</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors" data-icon="key">key</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-highest/50 border-none rounded-xl text-on-surface placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all duration-300" id="passphrase" placeholder="••••••••••••" type="password"/>
</div>
</div>
</div>
<div class="pt-4 space-y-4">
<button class="w-full py-4 bg-primary text-on-primary headline-font font-bold rounded-xl shadow-lg shadow-primary/25 hover:opacity-90 active:scale-[0.98] transition-all duration-200 flex items-center justify-center space-x-2">
<span>Create Account</span>
<span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
<div class="text-center">
<a class="text-slate-500 text-sm font-medium hover:text-primary transition-colors flex items-center justify-center space-x-1 group" href="#">
<span class="material-symbols-outlined text-base group-hover:-translate-x-1 transition-transform" data-icon="chevron_left">chevron_left</span>
<span>Back to Login</span>
</a>
</div>
</div>
</form>
</div>
</div>
<div class="fixed bottom-12 left-1/2 -translate-x-1/2 opacity-20 pointer-events-none select-none">
<h3 class="headline-font text-8xl font-black text-on-surface whitespace-nowrap tracking-tighter">
            ENLIGHTENMENT
        </h3>
</div>
</body></html>
