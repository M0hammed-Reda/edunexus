<body class="bg-background text-on-surface font-body selection:bg-primary-container selection:text-white">
<!-- Suppression of Nav Shells per focused task-intent: Quiz in progress -->
<!-- Top Bar / Header Component -->
<header class="fixed top-0 w-full z-50 bg-slate-50/70 backdrop-blur-xl flex justify-between items-center px-6 h-16 w-full">
<div class="flex items-center gap-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant">close</span>
</button>
<h1 class="font-headline font-bold tracking-tight text-xl text-blue-900">Epistemology Quiz 1</h1>
</div>
<div class="flex items-center gap-3 bg-tertiary-fixed text-on-tertiary-fixed px-4 py-1.5 rounded-full font-label font-bold tracking-wider">
<span class="material-symbols-outlined text-sm">timer</span>
<span class="tabular-nums">14:52</span>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-4xl mx-auto min-h-screen">
<!-- Progress Indicator -->
<div class="mb-12">
<div class="flex justify-between items-end mb-4">
<div class="space-y-1">
<p class="font-label text-xs uppercase tracking-widest text-secondary font-semibold">Question 04 of 12</p>
<p class="text-on-surface-variant text-sm">Topic: Modern Rationalism</p>
</div>
<div class="font-headline text-3xl font-extrabold text-primary-container">33%</div>
</div>
<div class="h-2 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full w-1/3 bg-gradient-to-r from-primary to-primary-container rounded-full"></div>
</div>
</div>
<!-- Question Canvas -->
<section class="space-y-10">
<div class="space-y-6">
<h2 class="font-headline text-3xl md:text-4xl font-bold leading-tight text-on-surface">
          What is the primary focus of rationalism as a theory of knowledge?
        </h2>
<div class="w-24 h-1 bg-tertiary-fixed-dim rounded-full"></div>
</div>
<!-- Options Bento/Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Option 1 -->
<button class="group relative flex items-center p-6 text-left bg-surface-container-low hover:bg-surface-container-lowest rounded-xl transition-all duration-200 active:scale-[0.98] outline outline-2 outline-transparent hover:outline-primary/10">
<div class="flex-shrink-0 w-10 h-10 rounded-lg bg-surface-container-highest flex items-center justify-center font-headline font-bold text-secondary group-hover:bg-primary group-hover:text-white transition-colors">A</div>
<span class="ml-4 font-body font-medium text-on-surface-variant group-hover:text-on-surface">Knowledge is primarily gained through sensory experience and observation.</span>
</button>
<!-- Option 2 (Selected State) -->
<button class="group relative flex items-center p-6 text-left bg-surface-container-lowest rounded-xl transition-all duration-200 active:scale-[0.98] outline outline-2 outline-primary">
<div class="flex-shrink-0 w-10 h-10 rounded-lg bg-primary flex items-center justify-center font-headline font-bold text-white">B</div>
<span class="ml-4 font-body font-medium text-on-surface">Knowledge is primarily gained through reason and innate ideas, independent of experience.</span>
<div class="absolute top-4 right-4">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Option 3 -->
<button class="group relative flex items-center p-6 text-left bg-surface-container-low hover:bg-surface-container-lowest rounded-xl transition-all duration-200 active:scale-[0.98] outline outline-2 outline-transparent hover:outline-primary/10">
<div class="flex-shrink-0 w-10 h-10 rounded-lg bg-surface-container-highest flex items-center justify-center font-headline font-bold text-secondary group-hover:bg-primary group-hover:text-white transition-colors">C</div>
<span class="ml-4 font-body font-medium text-on-surface-variant group-hover:text-on-surface">Knowledge is impossible to attain and truth is relative to the individual observer.</span>
</button>
<!-- Option 4 -->
<button class="group relative flex items-center p-6 text-left bg-surface-container-low hover:bg-surface-container-lowest rounded-xl transition-all duration-200 active:scale-[0.98] outline outline-2 outline-transparent hover:outline-primary/10">
<div class="flex-shrink-0 w-10 h-10 rounded-lg bg-surface-container-highest flex items-center justify-center font-headline font-bold text-secondary group-hover:bg-primary group-hover:text-white transition-colors">D</div>
<span class="ml-4 font-body font-medium text-on-surface-variant group-hover:text-on-surface">Knowledge is exclusively derived from divine revelation and sacred texts.</span>
</button>
</div>
</section>
